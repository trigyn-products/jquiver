
spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER
#============================================================================
# Configure Main Scheduler Properties
#============================================================================
#org.quartz.scheduler.instanceName=spring-boot-quartz-demo
org.quartz.scheduler.instanceId=AUTO
org.quartz.scheduler.instanceIdGenerator.class=com.trigyn.jws.quartz.util.InstanceVersion

#============================================================================
# Configure ThreadPool
#============================================================================
org.quartz.threadPool.class = org.quartz.simpl.SimpleThreadPool
org.quartz.threadPool.threadCount = 25
org.quartz.threadPool.threadPriority = 5

#============================================================================
# Configure JobStore
#============================================================================
org.quartz.jobStore.misfireThreshold=1000

org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
org.quartz.jobStore.useProperties=true
org.quartz.jobStore.tablePrefix=QRTZ_


#============================================================================
# Configure Cluster properties
#============================================================================
org.quartz.jobStore.isClustered=true
org.quartz.jobStore.clusterCheckinInterval=1000

javax.xml.bind.context.factory=com.sun.xml.bind.v2.ContextFactory
spring.main.allow-bean-definition-overriding=true
spring.jpa.properties.hibernate.current_session_context_class=thread



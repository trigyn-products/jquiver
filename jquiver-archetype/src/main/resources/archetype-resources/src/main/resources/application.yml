## JQuiver specific configurations.
jquiver:
# Provide the base url of the application
  baseurl: http://localhost:${APPLICATION_PORT}
# Below configuration will enable secured authentication where auth token will be encrypted in every request and response.
  enableSecuredAuthentication: false
  authTokenExpiryTime: 90

server:
  port: ${APPLICATION_PORT}
  shutdown: graceful
  servlet:
    context-path: /${context_path}
    session:
      persistent: false 
      timeout: -1
spring:
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      enabled: true
      max-file-size: -1
      max-request-size: -1
  web:
    resources:
      static-locations: classpath:/static/,classpath:/META-INF/resources/
      cache:
       cachecontrol:
        max-age: 365d
        cache-public: true
      chain:
        enabled: true
        strategy:
          content:
            enabled: true
            paths: /**
  #comment the profile out if you don't need this
  profiles: ${profileName}
  flyway:
    cleanDisabled: true
    enabled: true
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    #note: for docker or k8, you should use proper IP rather than localhost / 127.0.0.1 if the database is running on host machine
    url: jdbc:mariadb://${DB_URL}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&serverTimezone=UTC&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false
    ## if running on docker environment and mariadb server is not hosted on docker, then comment above line and uncomment below
    #url: jdbc:mariadb://host.docker.internal:${DB_PORT}/${DB_NAME}
    ## if running on docker environment and mariadb server is hosted on docker, then comment above line of url and uncomment below
    #url: jdbc:mariadb://${mariadb service name on docker}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    #comment url, username & password and uncomment below property if you want to use JDNI instead of direct connection
    #jndi-name: java:comp/env/jdbc/yourJNDI
logging:
  config: classpath:logback.xml
  level:
    root: info
    org:
      flywaydb: info

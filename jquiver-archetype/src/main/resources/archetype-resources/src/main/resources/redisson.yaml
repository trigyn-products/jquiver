# redisson configuration for redis servers
singleServerConfig:
  address: "redis://localhost:6379"     # Replace with your Redis host/port
  clientName: "JQuiverApplication"
  password: null                        # Set if authentication is enabled
  connectionPoolSize: 64               # Default is 64, increase if needed
  connectionMinimumIdleSize: 16        # Idle connections kept alive  #24 was there changed to 5
  subscriptionConnectionPoolSize: 32   # Default is 50, increase if needed
  idleConnectionTimeout: 10000
  connectTimeout: 10000
  timeout: 5000
  retryAttempts: 5
  retryInterval: 1000
  dnsMonitoringInterval: 5000

threads: 8                            # Redisson worker threads
nettyThreads: 16                       # Netty event loop threads


# Optional: enable reference support if needed
# referenceEnabled: true

# Transport mode (for native epoll if Linux)
# Optional: enable TCP_NODELAY for better latency in small payloads
transportMode: "NIO"
